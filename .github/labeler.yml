# Auto-label PRs by changed files
'feat':
  - src/**/*.rs
  - Cargo.toml

'fix':
  - src/**/*.rs

'docs':
  - '**/*.md'
  - '**/docs/**'

'ci':
  - .github/workflows/**/*
  - .github/**/*

'config':
  - 'opencode.json'
  - 'opencode.jsonc'
  - '**/opencode*'

'test':
  - tests/**/*

size/XS:
  - all:
      - '**/*'
    any:
      - count: '**/*.rs'
        min: 1
        max: 3

size/S:
  - all:
      - '**/*'
    any:
      - count: '**/*.rs'
        min: 4
        max: 10

size/M:
  - all:
      - '**/*'
    any:
      - count: '**/*.rs'
        min: 11
        max: 30

size/L:
  - all:
      - '**/*'
    any:
      - count: '**/*.rs'
        min: 31
        max: 100

size/XL:
  - all:
      - '**/*'
    any:
      - count: '**/*.rs'
        min: 101
