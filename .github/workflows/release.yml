name: Release

on:
  push:
    tags: ["v*"]

jobs:
  release:
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
          - os: ubuntu-24.04-arm
            target: aarch64-unknown-linux-gnu
          - os: macos-latest
            target: x86_64-apple-darwin
          - os: macos-latest
            target: aarch64-apple-darwin
          - os: windows-latest
            target: x86_64-pc-windows-msvc
    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ matrix.target }}-${{ hashFiles('**/Cargo.lock') }}

      - name: Build release
        run: cargo build --release --target ${{ matrix.target }}

      - name: Package
        shell: bash
        run: |
          BINARY_NAME="oura-${{ matrix.target }}"
          if [ "${{ runner.os }}" = "Windows" ]; then
            cp target/${{ matrix.target }}/release/oura.exe "${BINARY_NAME}.exe"
            7z a "${BINARY_NAME}.zip" "${BINARY_NAME}.exe" LICENSE README.md
          else
            cp target/${{ matrix.target }}/release/oura "${BINARY_NAME}"
            tar czf "${BINARY_NAME}.tar.gz" "${BINARY_NAME}" LICENSE README.md
          fi

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: oura-${{ matrix.target }}
          path: oura-${{ matrix.target }}.*

      - name: Upload to release
        if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: oura-${{ matrix.target }}.*
