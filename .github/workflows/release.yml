name: Release
on:
  push:
    tags: ['v*']
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Build but do not publish'
        required: true
        default: true
        type: boolean

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    name: Build ${{ matrix.target }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
          - os: ubuntu-24.04-arm
            target: aarch64-unknown-linux-gnu
          - os: macos-latest
            target: x86_64-apple-darwin
          - os: macos-latest
            target: aarch64-apple-darwin
          - os: windows-latest
            target: x86_64-pc-windows-msvc
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}
      - run: cargo build --release --target ${{ matrix.target }}
      - name: Package
        shell: bash
        run: |
          BINARY="oura"
          EXT=""
          [ "${{ runner.os }}" = "Windows" ] && EXT=".exe"
          SRC="target/${{ matrix.target }}/release/${BINARY}${EXT}"
          PKG="oura-${{ matrix.target }}${EXT}"
          cp "${SRC}" "${PKG}"
          if [ "${{ runner.os }}" != "Windows" ]; then
            strip "${PKG}" 2>/dev/null || true
          fi
          echo "BINARY=${PKG}" >> "$GITHUB_ENV"
      - uses: actions/upload-artifact@v4
        with:
          name: oura-${{ matrix.target }}
          path: oura-*
      - name: Upload to release
        if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/') && !inputs.dry_run
        uses: softprops/action-gh-release@v3
        with:
          files: oura-*
          generate_release_notes: true
          fail_on_unmatched_files: false
