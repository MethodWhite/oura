<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400">
  <defs>
    <linearGradient id="ringGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#6C5CE7"/>
      <stop offset="50%" stop-color="#A29BFE"/>
      <stop offset="100%" stop-color="#00B894"/>
    </linearGradient>
    <linearGradient id="nodeGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#A29BFE"/>
      <stop offset="100%" stop-color="#6C5CE7"/>
    </linearGradient>
    <linearGradient id="nodeGrad2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00B894"/>
      <stop offset="100%" stop-color="#55EFC4"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="glowStrong">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Ouroboros toroidal ring -->
  <g transform="translate(200, 170)">
    <!-- Outer ring (with ouroboros gap at bottom) -->
    <path d="M 0 -42 A 42 42 0 1 1 -1 42" fill="none" stroke="url(#ringGrad)" stroke-width="3" opacity="0.7"/>
    <path d="M 1 42 A 42 42 0 0 1 2 -42" fill="none" stroke="url(#ringGrad)" stroke-width="3" opacity="0.4" stroke-dasharray="4,6"/>

    <!-- Inner ring -->
    <path d="M 0 -22 A 22 22 0 1 1 -1 22" fill="none" stroke="url(#ringGrad)" stroke-width="2" opacity="0.5"/>
    <path d="M 1 22 A 22 22 0 0 1 2 -22" fill="none" stroke="url(#ringGrad)" stroke-width="2" opacity="0.25" stroke-dasharray="3,5"/>

    <!-- Toroidal bridges -->
    <line x1="0" y1="-42" x2="0" y2="-22" stroke="#6C5CE7" stroke-width="2" opacity="0.5"/>
    <line x1="36" y1="-21" x2="19" y2="-11" stroke="#6C5CE7" stroke-width="2" opacity="0.5"/>
    <line x1="36" y1="21" x2="19" y2="11" stroke="#00B894" stroke-width="2" opacity="0.5"/>
    <line x1="-36" y1="21" x2="-19" y2="11" stroke="#00B894" stroke-width="2" opacity="0.5"/>
    <line x1="-36" y1="-21" x2="-19" y2="-11" stroke="#6C5CE7" stroke-width="2" opacity="0.5"/>

    <!-- Ouroboros head (at the gap, right side) -->
    <ellipse cx="6" cy="44" rx="6" ry="5" fill="#6C5CE7" opacity="0.8" transform="rotate(30 6 44)"/>
    <circle cx="9" cy="42" r="1.5" fill="#00B894"/>
    <circle cx="9" cy="42" r="0.7" fill="#fff"/>

    <!-- Ouroboros tail tip (at the gap, left side) -->
    <circle cx="-6" cy="44" r="2.5" fill="#00B894" opacity="0.6"/>

    <!-- Core node -->
    <g filter="url(#glowStrong)">
      <circle cx="0" cy="0" r="4" fill="url(#nodeGrad)"/>
      <circle cx="0" cy="0" r="9" fill="#6C5CE7" opacity="0.12"/>
      <circle cx="0" cy="0" r="14" fill="none" stroke="#6C5CE7" stroke-width="0.6" opacity="0.2">
        <animate attributeName="r" values="12;18;12" dur="3s" repeatCount="indefinite"/>
        <animate attributeName="opacity" values="0.25;0;0.25" dur="3s" repeatCount="indefinite"/>
      </circle>
    </g>

    <!-- Loop signal arcs -->
    <path d="M 16 -10 Q 26 0 16 10" fill="none" stroke="#00B894" stroke-width="1.5" opacity="0.35" stroke-dasharray="3,3"/>
    <path d="M -16 -10 Q -26 0 -16 10" fill="none" stroke="#6C5CE7" stroke-width="1.5" opacity="0.35" stroke-dasharray="3,3"/>
  </g>

  <!-- Orbiting iteration nodes -->
  <g filter="url(#glowStrong)">
    <circle cx="200" cy="120" r="3" fill="url(#nodeGrad)"/>
    <circle cx="252" cy="149" r="3" fill="url(#nodeGrad2)"/>
    <circle cx="252" cy="191" r="3" fill="url(#nodeGrad)"/>
    <circle cx="200" cy="220" r="3" fill="url(#nodeGrad2)"/>
    <circle cx="148" cy="191" r="3" fill="url(#nodeGrad)"/>
    <circle cx="148" cy="149" r="3" fill="url(#nodeGrad2)"/>
  </g>

  <!-- Connection pathways -->
  <g filter="url(#glow)" opacity="0.25">
    <line x1="200" y1="120" x2="200" y2="128" stroke="#6C5CE7" stroke-width="1" stroke-dasharray="2,3"/>
    <line x1="252" y1="149" x2="238" y2="156" stroke="#00B894" stroke-width="1" stroke-dasharray="2,3"/>
    <line x1="252" y1="191" x2="238" y2="184" stroke="#6C5CE7" stroke-width="1" stroke-dasharray="2,3"/>
    <line x1="200" y1="220" x2="200" y2="212" stroke="#00B894" stroke-width="1" stroke-dasharray="2,3"/>
    <line x1="148" y1="191" x2="162" y2="184" stroke="#6C5CE7" stroke-width="1" stroke-dasharray="2,3"/>
    <line x1="148" y1="149" x2="162" y2="156" stroke="#00B894" stroke-width="1" stroke-dasharray="2,3"/>
  </g>

  <!-- Text -->
  <text x="200" y="305" text-anchor="middle" font-family="'Segoe UI','Helvetica Neue',Arial,sans-serif" font-size="36" font-weight="700" fill="#6C5CE7" filter="url(#glow)">OURA</text>
  <text x="200" y="330" text-anchor="middle" font-family="'Segoe UI','Helvetica Neue',Arial,sans-serif" font-size="10" font-weight="400" fill="#00B894" letter-spacing="5">LOOP ENGINE</text>
</svg>
